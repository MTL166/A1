<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据分析</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- 引入ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        .btn-success {
            background-color: #28a745;
            color: white;
        }
        .btn-danger {
            background-color: #dc3545;
            color: white;
        }
        .btn-secondary {
            background-color: #6c757d;
            color: white;
        }
        .btn-primary {
            background-color: #007bff;
            color: white;
        }
        .btn-info {
            background-color: #17a2b8;
            color: white;
        }
        .center-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            min-height: 80vh;
            padding: 20px;
        }
        .chart-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }
        .chart-title {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
            font-weight: 600;
        }
        #lineChart {
            width: 100%;
            height: 500px;
            margin: 0 auto;
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .date-filter {
            background-color: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .date-filter h5 {
            color: #495057;
            margin-bottom: 10px;
        }
        .date-inputs {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }
        .date-input-group {
            display: flex;
            flex-direction: column;
            min-width: 200px;
        }
        .date-input-group label {
            margin-bottom: 5px;
            font-weight: 500;
            color: #495057;
        }
        .data-info {
            background-color: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }
        .data-info h5 {
            color: #495057;
            margin-bottom: 10px;
        }
        .legend-item {
            display: inline-block;
            margin-right: 20px;
            margin-bottom: 10px;
        }
        .legend-color {
            display: inline-block;
            width: 15px;
            height: 15px;
            margin-right: 5px;
            border-radius: 3px;
        }
        @media (max-width: 768px) {
            .chart-container {
                padding: 10px;
            }
            #lineChart {
                height: 400px;
            }
            .header-actions {
                flex-direction: column;
                align-items: flex-start;
            }
            .date-inputs {
                flex-direction: column;
                align-items: stretch;
            }
            .date-input-group {
                min-width: 100%;
            }
        }
        @media (max-width: 576px) {
            #lineChart {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    {% include "myapp/_header.html" %}

    <div class="center-container">
        <div class="chart-container">
            <div class="header-actions">
                <h3>养殖环境传感器数据趋势图</h3>
                <div>
                    <a href="{% url 'mqtt_get_messages' %}" class="btn btn-secondary">返回数据列表</a>
                    <button onclick="refreshChart()" class="btn btn-primary" style="margin-left: 10px;">刷新图表</button>
                </div>
            </div>
            
            <!-- 日期筛选器 -->
            <div class="date-filter">
                <h5>日期筛选</h5>
                <form id="dateFilterForm" method="get" action="{% url 'line_chart_view' %}">
                    <div class="date-inputs">
                        <div class="date-input-group">
                            <label for="start_date">开始日期：</label>
                            <input type="date" id="start_date" name="start_date" 
                                   value="{{ start_date }}" class="form-control" 
                                   max="{{ end_date }}">
                        </div>
                        <div class="date-input-group">
                            <label for="end_date">结束日期：</label>
                            <input type="date" id="end_date" name="end_date" 
                                   value="{{ end_date }}" class="form-control"
                                   max="{% now 'Y-m-d' %}">
                        </div>
                        <div style="display: flex; align-items: flex-end;">
                            <button type="submit" class="btn btn-info">筛选</button>
                            <button type="button" onclick="resetDates()" class="btn btn-secondary" style="margin-left: 10px;">重置</button>
                        </div>
                    </div>
                    <div style="margin-top: 10px; font-size: 0.9em; color: #6c757d;">
                        <span>提示：最多可选择10天内的数据</span>
                    </div>
                </form>
            </div>
            
            <div class="chart-title">养殖环境传感器数据趋势（每日平均值）</div>
            
            <!-- 图表容器 -->
            <div id="lineChart"></div>
            
            <!-- 图例说明 -->
            <div class="data-info">
                <h5>图例说明：</h5>
                <div class="legend-item">
                    <span class="legend-color" style="background-color: #5470c6;"></span>
                    <span>温度(℃)</span>
                </div>
                <div class="legend-item">
                    <span class="legend-color" style="background-color: #91cc75;"></span>
                    <span>光照强度</span>
                </div>
                <div class="legend-item">
                    <span class="legend-color" style="background-color: #fac858;"></span>
                    <span>溶解氧(O₂)</span>
                </div>
                <div class="legend-item">
                    <span class="legend-color" style="background-color: #ee6666;"></span>
                    <span>TDS值</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 从Django模板中获取数据
        const chartData = {{ chart_data_json|safe }};
        
        // 初始化ECharts实例
        const chartDom = document.getElementById('lineChart');
        const myChart = echarts.init(chartDom);
        
        // 配置项
        const option = {
            title: {
                text: '养殖环境传感器数据趋势图',
                left: 'center',
                textStyle: {
                    fontSize: 16,
                    fontWeight: 'bold'
                }
            },
            tooltip: {
                trigger: 'axis',
                formatter: function(params) {
                    let result = params[0].name + '<br/>';
                    params.forEach(function(item) {
                        result += '<span style="display:inline-block;margin-right:5px;border-radius:10px;width:10px;height:10px;background-color:' + item.color + '"></span>';
                        result += item.seriesName + ': ' + item.value + '<br/>';
                    });
                    return result;
                }
            },
            legend: {
                data: ['温度(℃)', '光照强度', '溶解氧(O₂)', 'TDS值'],
                top: 30,
                textStyle: {
                    fontSize: 12
                }
            },
            grid: {
                left: '3%',
                right: '4%',
                bottom: '10%',
                top: '15%',
                containLabel: true
            },
            toolbox: {
                feature: {
                    saveAsImage: {
                        title: '保存为图片',
                        pixelRatio: 2
                    },
                    dataView: {
                        title: '数据视图',
                        readOnly: true,
                        lang: ['数据视图', '关闭', '刷新']
                    }
                },
                right: 20,
                top: 10
            },
            xAxis: {
                type: 'category',
                boundaryGap: false,
                data: chartData.dates,
                name: '日期',
                nameLocation: 'middle',
                nameGap: 30,
                axisLabel: {
                    rotate: 45
                }
            },
            yAxis: {
                type: 'value',
                name: '数值',
                min: 0,
                max: 100,
                interval: 20,
                axisLabel: {
                    formatter: '{value}'
                }
            },
            series: [
                {
                    name: '温度(℃)',
                    type: 'line',
                    data: chartData.temp,
                    itemStyle: {
                        color: '#5470c6'
                    },
                    lineStyle: {
                        width: 3
                    },
                    symbol: 'circle',
                    symbolSize: 8,
                    smooth: true
                },
                {
                    name: '光照强度（/10）',
                    type: 'line',
                    data: chartData.light,
                    itemStyle: {
                        color: '#91cc75'
                    },
                    lineStyle: {
                        width: 3
                    },
                    symbol: 'circle',
                    symbolSize: 8,
                    smooth: true
                },
                {
                    name: '溶解氧(O₂)',
                    type: 'line',
                    data: chartData.oxygen,
                    itemStyle: {
                        color: '#fac858'
                    },
                    lineStyle: {
                        width: 3
                    },
                    symbol: 'circle',
                    symbolSize: 8,
                    smooth: true
                },
                {
                    name: 'TDS值（/10）',
                    type: 'line',
                    data: chartData.tds,
                    itemStyle: {
                        color: '#ee6666'
                    },
                    lineStyle: {
                        width: 3
                    },
                    symbol: 'circle',
                    symbolSize: 8,
                    smooth: true
                }
            ]
        };
        
        // 使用配置项和数据显示图表
        myChart.setOption(option);
        
        // 窗口大小改变时重绘图表
        window.addEventListener('resize', function() {
            myChart.resize();
        });
        
        // 刷新图表函数
        function refreshChart() {
            location.reload();
        }
        
        // 重置日期函数
        function resetDates() {
            const today = new Date().toISOString().split('T')[0];
            const tenDaysAgo = new Date();
            tenDaysAgo.setDate(tenDaysAgo.getDate() - 9);
            const tenDaysAgoStr = tenDaysAgo.toISOString().split('T')[0];
            
            document.getElementById('start_date').value = tenDaysAgoStr;
            document.getElementById('end_date').value = today;
            document.getElementById('dateFilterForm').submit();
        }
        
        // 设置日期输入框的最大值
        document.addEventListener('DOMContentLoaded', function() {
            const today = new Date().toISOString().split('T')[0];
            const endDateInput = document.getElementById('end_date');
            const startDateInput = document.getElementById('start_date');
            
            // 设置结束日期最大值为今天
            endDateInput.max = today;
            
            // 当结束日期变化时，更新开始日期的最大值
            endDateInput.addEventListener('change', function() {
                startDateInput.max = this.value;
            });
            
            // 当开始日期变化时，更新结束日期的最小值
            startDateInput.addEventListener('change', function() {
                endDateInput.min = this.value;
            });
            
            // 初始化最小值和最大值
            if (endDateInput.value) {
                startDateInput.max = endDateInput.value;
            }
            if (startDateInput.value) {
                endDateInput.min = startDateInput.value;
            }
        });
        
        // 初始调整大小
        setTimeout(function() {
            myChart.resize();
        }, 100);
    </script>
</body>
</html>
