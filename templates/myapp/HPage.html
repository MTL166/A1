<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .btn-group{
            display: flex;
            gap: 20px;
        }
        .custon-btn{
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 600;
            color: aliceblue;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.5s ease;
        }
        .btn1{
            background-color: aqua;
        }
        .btn2{
            background-color: rgb(64, 0, 255);
        }
        .btn3{
            background-color: rgb(255, 0, 0);
        }
        .btn4{
            background-color: rgb(0, 255, 8);
        }
        .btn5{
            background-color: rgb(247, 0, 255);
        }
        .btn-group:hover .custon-btn{
            transform: scale(0.9);
        }
        .btn-group .custon-btn:hover{
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    {% include "myapp/_header.html" %}
    <div class="btn-group">
        {% csrf_token %}
        <a class="custon-btn btn1" href="{% url 'indexusers' %}">用户信息管理</a>
        <a class="custon-btn btn2" href="{% url 'mqtt_dashboard' %}">MQTT链接管理</a>
        <a class="custon-btn btn3" href="{% url 'yolov8_detection' %}">明虾病害检测</a>
        <a class="custon-btn btn4" href="{% url 'threshold_settings' %}">阈值设置</a>
        <a class="custon-btn btn5" href="{% url 'mqtt_get_messages' %}">消息查找</a>
    </div>
</body>
